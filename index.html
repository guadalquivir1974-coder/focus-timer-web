<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Timer de concentración</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="theme-color" content="#0b1220" />
</head>
<body>
  <main class="container">
    <header class="header">
      <div class="titleRow">
        <div class="titleBlock">
          <h1>Timer de concentración</h1>
          <p class="sub">Minutos configurables. Iniciar/Pausar. Reset. Todo en tu navegador.</p>
        </div>

        <button id="themeToggle" class="iconBtn" type="button" aria-label="Cambiar tema" title="Cambiar tema">
          <span class="icon" aria-hidden="true">☾</span>
        </button>
      </div>
    </header>

    <section class="card" aria-label="Temporizador">
      <div class="display" aria-live="polite">
        <div class="ring" role="img" aria-label="Progreso del temporizador">
          <svg viewBox="0 0 120 120" class="svg" aria-hidden="true">
            <circle class="track" cx="60" cy="60" r="52" />
            <circle class="progress" cx="60" cy="60" r="52" />
          </svg>
          <div class="time" id="timeText">25:00</div>
          <div class="status" id="statusText">Listo</div>
        </div>
      </div>

      <div class="controls">
        <div class="config">
          <label for="minutes">Minutos</label>
          <input id="minutes" type="number" min="1" max="180" step="1" value="25" inputmode="numeric" />
          <button id="applyBtn" class="btn secondary" type="button">Aplicar</button>
        </div>

        <div class="buttons">
          <button id="startPauseBtn" class="btn primary" type="button">Iniciar</button>
          <button id="resetBtn" class="btn ghost" type="button">Reset</button>
        </div>

        <div class="hint" aria-label="Atajos de teclado">
          <span class="kbd">Espacio</span> Iniciar/Pausar
          <span class="dot">•</span>
          <span class="kbd">R</span> Reset
          <span class="dot">•</span>
          <span class="kbd">T</span> Tema
        </div>
      </div>
    </section>

    <footer class="footer">
      <small>Tip: define una sola tarea y elimina distracciones durante este bloque.</small>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
